<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust Developer API Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for premium feel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0B0F19] text-gray-200 font-sans min-h-screen flex flex-col">

    <header class="border-b border-gray-800 bg-[#111827] px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="h-8 w-8 bg-gradient-to-tr from-purple-500 to-indigo-600 rounded-lg flex items-center justify-center font-bold text-white shadow-lg">S</div>
            <h1 class="text-xl font-bold tracking-wide bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">Stardust <span class="text-indigo-400 text-sm font-medium">API Hub</span></h1>
        </div>
        <div class="text-xs bg-indigo-950/50 text-indigo-400 border border-indigo-800/50 px-3 py-1 rounded-full font-mono">v1.0.0 (Beta)</div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row">
        <aside class="w-full md:w-80 border-r border-gray-800 bg-[#0F1422] p-4 space-y-4">
            <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-2">Core Endpoints</h2>
            <nav class="space-y-1" id="endpoint-list">
                <button onclick="loadMockData('users')" class="w-full text-left px-3 py-2.5 rounded-lg bg-indigo-600/10 text-indigo-400 border border-indigo-500/20 font-mono text-sm transition flex justify-between items-center">
                    <span>GET /users</span>
                    <span class="text-[10px] bg-green-950 text-green-400 px-1.5 py-0.5 rounded border border-green-800">200 OK</span>
                </button>
                <button onclick="loadMockData('products')" class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-gray-800/50 text-gray-400 font-mono text-sm transition flex justify-between items-center group">
                    <span class="group-hover:text-gray-200">GET /products</span>
                    <span class="text-[10px] bg-gray-900 text-gray-500 px-1.5 py-0.5 rounded border border-gray-800">200 OK</span>
                </button>
            </nav>
        </aside>

        <section class="flex-1 bg-[#090D16] p-6 flex flex-col space-y-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2 bg-[#111827] border border-gray-800 px-3 py-1.5 rounded-lg w-full max-w-xl">
                    <span class="text-xs font-bold text-green-400 font-mono">GET</span>
                    <input type="text" id="api-url-bar" readonly value="https://stardust.api/v1/users" class="bg-transparent text-xs text-gray-400 font-mono focus:outline-none w-full select-all">
                    <button onclick="copyURL()" class="text-xs text-indigo-400 hover:text-indigo-300 font-medium px-2">Copy</button>
                </div>
            </div>

            <div class="flex-1 border border-gray-800 rounded-xl bg-[#0E131F] p-4 font-mono text-sm overflow-auto shadow-inner relative">
                <div class="absolute right-4 top-4">
                    <button onclick="copyJSON()" class="bg-[#1F2937] hover:bg-gray-700 text-xs px-3 py-1.5 rounded-md text-gray-300 transition">Copy JSON</button>
                </div>
                <pre id="json-code-block" class="text-purple-400">Loading initial configuration...</pre>
            </div>
        </section>
    </main>

    <script>
        // Mock Databases
        const mockDatabase = {
            users: [
                { id: 1, name: "Zishan", role: "Founder", status: "Active" },
                { id: 2, name: "Alex Mercer", role: "Frontend Dev", status: "Active" },
                { id: 3, name: "Sarah Connor", role: "Security Analyst", status: "Inactive" }
            ],
            products: [
                { id: 101, title: "Stardust Formatter", type: "Utility", price: 0.00 },
                { id: 102, title: "Stardust Notes", type: "Vault", price: 0.00 }
            ]
        };

        // Function to render data into the code block
        function loadMockData(key) {
            const data = mockDatabase[key];
            document.getElementById('json-code-block').textContent = JSON.stringify(data, null, 4);
            document.getElementById('api-url-bar').value = `https://stardustofficial.github.io/stardust-api/v1/${key}.json`;
            
            // Update Active Tab UI
            const buttons = document.querySelectorAll('#endpoint-list button');
            buttons.forEach(btn => {
                if(btn.innerText.includes(key)) {
                    btn.className = "w-full text-left px-3 py-2.5 rounded-lg bg-indigo-600/10 text-indigo-400 border border-indigo-500/20 font-mono text-sm transition flex justify-between items-center";
                } else {
                    btn.className = "w-full text-left px-3 py-2.5 rounded-lg hover:bg-gray-800/50 text-gray-400 font-mono text-sm transition flex justify-between items-center group";
                }
            });
        }

        function copyURL() {
            const urlBar = document.getElementById('api-url-bar');
            navigator.clipboard.writeText(urlBar.value);
            alert("API URL copied to clipboard!");
        }

        function copyJSON() {
            const jsonText = document.getElementById('json-code-block').textContent;
            navigator.clipboard.writeText(jsonText);
            alert("Mock JSON data copied!");
        }

        // Initialize with default data
        window.onload = () => loadMockData('users');
    </script>
</body>
  </html>
