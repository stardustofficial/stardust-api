<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust Developer API Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0B0F19] text-gray-200 font-sans min-h-screen flex flex-col">

    <header class="border-b border-purple-950 bg-[#111322] px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3">
            <div class="h-8 w-8 bg-gradient-to-tr from-purple-600 to-indigo-600 rounded-lg flex items-center justify-center font-bold text-white shadow-md shadow-purple-500/20">S</div>
            <h1 class="text-xl font-bold tracking-wide bg-gradient-to-r from-white via-purple-200 to-gray-400 bg-clip-text text-transparent">Stardust <span class="text-purple-400 text-sm font-medium">API Engine</span></h1>
        </div>
        <div class="text-xs bg-purple-950/40 text-purple-400 border border-purple-800/40 px-3 py-1 rounded-full font-mono">v1.1.0 (Advanced)</div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row">
        
        <aside class="w-full md:w-80 border-r border-purple-950/40 bg-[#0F1122] p-4 space-y-6">
            <div>
                <h2 class="text-xs font-semibold text-purple-400/70 uppercase tracking-wider px-2 mb-2">Core Endpoints</h2>
                <nav class="space-y-1.5" id="endpoint-list">
                    <button onclick="loadMockData('users')" id="btn-users" class="w-full text-left px-3 py-2.5 rounded-lg bg-purple-600/10 text-purple-400 border border-purple-500/20 font-mono text-sm transition flex justify-between items-center">
                        <span>GET /users</span>
                        <span class="text-[10px] bg-green-950 text-green-400 px-1.5 py-0.5 rounded border border-green-800">200 OK</span>
                    </button>
                    <button onclick="loadMockData('products')" id="btn-products" class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-purple-950/30 text-gray-400 font-mono text-sm transition flex justify-between items-center group">
                        <span class="group-hover:text-purple-300">GET /products</span>
                        <span class="text-[10px] bg-gray-900 text-gray-500 px-1.5 py-0.5 rounded border border-gray-800">200 OK</span>
                    </button>
                </nav>
            </div>

            <div class="pt-4 border-t border-purple-950/40">
                <h2 class="text-xs font-semibold text-purple-400/70 uppercase tracking-wider px-2 mb-2">Tools</h2>
                <button onclick="showGenerator()" id="btn-generator" class="w-full text-left px-3 py-3 rounded-lg bg-gradient-to-r from-purple-900/40 to-indigo-900/40 hover:from-purple-900/60 hover:to-indigo-900/60 text-purple-300 border border-purple-700/30 font-medium text-sm transition flex items-center space-x-2 shadow-sm">
                    <span>⚡ Create Custom API</span>
                </button>
            </div>
        </aside>

        <section class="flex-1 bg-[#090A14] p-6 flex flex-col space-y-4">
            
            <div id="viewer-panel" class="flex-1 flex flex-col space-y-4">
                <div class="flex items-center space-x-2 bg-[#121424] border border-purple-950/60 px-3 py-2 rounded-lg w-full max-w-2xl shadow-inner">
                    <span class="text-xs font-bold text-green-400 font-mono">GET</span>
                    <input type="text" id="api-url-bar" readonly value="" class="bg-transparent text-xs text-purple-300/80 font-mono focus:outline-none w-full select-all">
                    <button onclick="copyURL()" class="text-xs text-purple-400 hover:text-purple-300 font-semibold px-2">Copy</button>
                </div>

                <div class="flex-1 border border-purple-950/40 rounded-xl bg-[#0D0E1A] p-4 font-mono text-sm overflow-auto shadow-xl relative">
                    <div class="absolute right-4 top-4 z-10">
                        <button onclick="copyJSON()" class="bg-purple-950/80 hover:bg-purple-900 text-xs px-3 py-1.5 rounded-md text-purple-300 border border-purple-800/40 transition shadow-md">Copy JSON</button>
                    </div>
                    <pre id="json-code-block" class="text-purple-300/90 leading-relaxed">Loading database engine...</pre>
                </div>
            </div>

            <div id="generator-panel" class="hidden flex-1 flex flex-col space-y-4">
                <div class="border border-purple-950/60 bg-[#121424] p-5 rounded-xl shadow-lg space-y-4 max-w-2xl">
                    <h3 class="text-lg font-bold text-white">Custom JSON Data Generator</h3>
                    <p class="text-xs text-gray-400">Apni pasand ke mutabik data fields chuniye aur instant mock API structure generate kijiye.</p>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-purple-400 uppercase mb-1">Root Resource Object</label>
                            <input type="text" id="custom-root" value="posts" class="w-full bg-[#0D0E1A] border border-purple-950/60 rounded-lg p-2 text-sm text-white focus:border-purple-500 focus:outline-none font-mono">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-purple-400 uppercase mb-1">Total Items (Array Size)</label>
                            <input type="number" id="custom-count" value="3" max="10" class="w-full bg-[#0D0E1A] border border-purple-950/60 rounded-lg p-2 text-sm text-white focus:border-purple-500 focus:outline-none font-mono">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-semibold text-purple-400 uppercase">Select Data Fields to Include</label>
                        <div class="flex flex-wrap gap-3 p-3 bg-[#0D0E1A] border border-purple-950/40 rounded-lg">
                            <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer"><input type="checkbox" id="field-id" checked disabled class="accent-purple-600"> <span>ID</span></label>
                            <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer"><input type="checkbox" id="field-title" checked class="accent-purple-600"> <span>Title / Name</span></label>
                            <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer"><input type="checkbox" id="field-slug" checked class="accent-purple-600"> <span>Slug URL</span></label>
                            <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer"><input type="checkbox" id="field-views" class="accent-purple-600"> <span>Views Count</span></label>
                            <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer"><input type="checkbox" id="field-status" class="accent-purple-600"> <span>Status Flag</span></label>
                        </div>
                    </div>

                    <button onclick="generateCustomJSON()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-2.5 rounded-lg text-sm transition shadow-md shadow-purple-600/20">Compile Custom API Structure</button>
                </div>

                <div class="flex-1 border border-purple-950/40 rounded-xl bg-[#0D0E1A] p-4 font-mono text-sm overflow-auto relative">
                    <div class="absolute right-4 top-4 z-10">
                        <button onclick="copyGeneratedJSON()" class="bg-purple-950/80 hover:bg-purple-900 text-xs px-3 py-1.5 rounded-md text-purple-300 border border-purple-800/40 transition">Copy Schema</button>
                    </div>
                    <pre id="custom-json-output" class="text-indigo-400 leading-relaxed">// Click "Compile" above to map custom architecture...</pre>
                </div>
            </div>
        </section>
    </main>

    <script>
        const mockDatabase = {
            users: [
                { id: 1, name: "Zishan", role: "Founder", status: "Active" },
                { id: 2, name: "Alex Mercer", role: "Frontend Dev", status: "Active" },
                { id: 3, name: "Sarah Connor", role: "Security Analyst", status: "Inactive" }
            ],
            products: [
                { id: 101, title: "Stardust Formatter", type: "Utility", price: 0.00 },
                { id: 102, title: "Stardust Notes", type: "Vault", price: 0.00 }
            ]
        };

        function loadMockData(key) {
            document.getElementById('generator-panel').classList.add('hidden');
            document.getElementById('viewer-panel').classList.remove('hidden');
            
            // Set UI active modes
            document.getElementById('btn-generator').className = "w-full text-left px-3 py-3 rounded-lg bg-gradient-to-r from-purple-900/20 to-indigo-900/20 text-purple-400 border border-purple-950/40 font-medium text-sm transition flex items-center space-x-2";
            
            document.getElementById('json-code-block').textContent = JSON.stringify(mockDatabase[key], null, 4);
            document.getElementById('api-url-bar').value = `https://stardustofficial.github.io/stardust-api/v1/${key}.json`;
            
            ['users', 'products'].forEach(item => {
                const btn = document.getElementById(`btn-${item}`);
                if(item === key) {
                    btn.className = "w-full text-left px-3 py-2.5 rounded-lg bg-purple-600/10 text-purple-400 border border-purple-500/20 font-mono text-sm transition flex justify-between items-center";
                } else {
                    btn.className = "w-full text-left px-3 py-2.5 rounded-lg hover:bg-purple-950/30 text-gray-400 font-mono text-sm transition flex justify-between items-center group";
                }
            });
        }

        function showGenerator() {
            document.getElementById('viewer-panel').classList.add('hidden');
            document.getElementById('generator-panel').classList.remove('hidden');
            
            // Update active state tabs
            document.getElementById('btn-users').className = "w-full text-left px-3 py-2.5 rounded-lg hover:bg-purple-950/30 text-gray-400 font-mono text-sm transition flex justify-between items-center group";
            document.getElementById('btn-products').className = "w-full text-left px-3 py-2.5 rounded-lg hover:bg-purple-950/30 text-gray-400 font-mono text-sm transition flex justify-between items-center group";
            document.getElementById('btn-generator').className = "w-full text-left px-3 py-3 rounded-lg bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-medium text-sm transition flex items-center space-x-2 shadow-md shadow-purple-500/20";
        }

        function generateCustomJSON() {
            const root = document.getElementById('custom-root').value || 'items';
            const count = Math.min(parseInt(document.getElementById('custom-count').value) || 1, 10);
            
            const schema = [];
            for (let i = 1; i <= count; i++) {
                let obj = { id: i };
                if (document.getElementById('field-title').checked) obj[`${root.slice(0,-1) || 'item'}_name`] = `Mock ${root} Sample Data ${i}`;
                if (document.getElementById('field-slug').checked) obj["slug_url"] = `https://stardust-engine/dynamic/${root}/${i}`;
                if (document.getElementById('field-views').checked) obj["metric_views"] = Math.floor(Math.random() * 5000) + 100;
                if (document.getElementById('field-status').checked) obj["is_deployed"] = true;
                schema.push(obj);
            }

            const wrapper = {};
            wrapper[root] = schema;

            document.getElementById('custom-json-output').textContent = JSON.stringify(wrapper, null, 4);
        }

        function copyURL() {
            navigator.clipboard.writeText(document.getElementById('api-url-bar').value);
            alert("Live Endpoint URL Copied!");
        }
        function copyJSON() {
            navigator.clipboard.writeText(document.getElementById('json-code-block').textContent);
            alert("Raw JSON payload copied!");
        }
        function copyGeneratedJSON() {
            navigator.clipboard.writeText(document.getElementById('custom-json-output').textContent);
            alert("Custom compiled scheme copied!");
        }

        window.onload = () => loadMockData('users');
    </script>
</body>
                        </html>
